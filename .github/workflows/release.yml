name: release

on:
  push:
    tags:
      - v*

permissions:
  contents: write
  packages: write

jobs:
  metadata:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Resolve release version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "${GITHUB_OUTPUT}"

  build-release-assets:
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-24.04
            rid: linux-x64
          - os: macos-14
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Ensure native build prerequisites (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          if ! command -v cmake >/dev/null 2>&1 || ! command -v ninja >/dev/null 2>&1 || ! command -v g++ >/dev/null 2>&1 || ! command -v curl >/dev/null 2>&1; then
            if command -v sudo >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y build-essential cmake ninja-build curl
            else
              apt-get update
              apt-get install -y build-essential cmake ninja-build curl
            fi
          fi

      - name: Ensure native build prerequisites (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if ! command -v cmake >/dev/null 2>&1 || ! command -v ninja >/dev/null 2>&1; then
            brew update
            brew install cmake ninja
          fi

      - name: Restore managed solution
        run: dotnet restore VisualLLM.NET.slnx

      - name: Build managed solution
        run: dotnet build VisualLLM.NET.slnx -c Release --no-restore

      - name: Run managed tests
        run: dotnet test VisualLLM.NET.slnx -c Release --no-build

      - name: Build native runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/build-native-runtime.ps1 -RuntimeIdentifier ${{ matrix.rid }}

      - name: Build native runtime (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: bash ./scripts/build-native-runtime.sh ${{ matrix.rid }}

      - name: Package release artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package-release.ps1 -RuntimeIdentifier ${{ matrix.rid }} -Version ${{ needs.metadata.outputs.version }}

      - name: Package release artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: VERSION=${{ needs.metadata.outputs.version }} bash ./scripts/package-release.sh ${{ matrix.rid }}

      - name: Run native smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/smoke-native-runtime.ps1 -RuntimeIdentifier ${{ matrix.rid }}

      - name: Run native smoke test (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: bash ./scripts/smoke-native-runtime.sh ${{ matrix.rid }}

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: VisualLLM.NET-v${{ needs.metadata.outputs.version }}-${{ matrix.rid }}
          path: artifacts/release/*
          if-no-files-found: error

  publish-github-packages:
    needs:
      - metadata
      - build-release-assets
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore managed solution
        run: dotnet restore VisualLLM.NET.slnx

      - name: Pack VisualLLM.Inference
        shell: bash
        run: bash ./scripts/pack-nuget.sh ${{ needs.metadata.outputs.version }}

      - name: Configure GitHub Packages source
        shell: bash
        run: |
          dotnet nuget remove source github-packages >/dev/null 2>&1 || true
          dotnet nuget add source \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text \
            --name github-packages \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Publish VisualLLM.Inference package
        shell: bash
        run: |
          shopt -s nullglob
          packages=(artifacts/nuget/*.nupkg)
          if [[ ${#packages[@]} -eq 0 ]]; then
            echo "No NuGet packages were produced." >&2
            exit 1
          fi

          for package in "${packages[@]}"; do
            dotnet nuget push "${package}" --source github-packages --skip-duplicate
          done

  publish-release:
    needs:
      - metadata
      - build-release-assets
      - publish-github-packages
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: VisualLLM.NET-v${{ needs.metadata.outputs.version }}-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release asset bundle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.metadata.outputs.version }}
          body_path: docs/releases/v${{ needs.metadata.outputs.version }}.md
          files: release-assets/*
          fail_on_unmatched_files: true
